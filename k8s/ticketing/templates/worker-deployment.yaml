{{- if .Values.worker.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ticketing.componentLabels" (dict "ctx" $ "component" "worker") | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "ticketing.componentSelectorLabels" (dict "ctx" $ "component" "worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ticketing.componentSelectorLabels" (dict "ctx" $ "component" "worker") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ticketing.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: worker
          image: {{ include "ticketing.image" (dict "ctx" $ "image" .Values.worker.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ticketing.fullname" . }}-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ticketing.fullname" . }}-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ticketing.fullname" . }}-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ticketing.fullname" . }}-config
                  key: POSTGRES_USER
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ticketing.fullname" . }}-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ticketing.fullname" . }}-config
                  key: REDIS_PORT
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ticketing.fullname" . }}-config
                  key: NODE_ENV
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ticketing.fullname" . }}-config
                  key: LOG_LEVEL
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ticketing.fullname" . }}-secret
                  key: POSTGRES_PASSWORD
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "pgrep -f node"
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
{{- end }}
