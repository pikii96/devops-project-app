{{- if .Values.frontend.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ticketing.componentLabels" (dict "ctx" $ "component" "frontend") | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    {{- include "ticketing.componentSelectorLabels" (dict "ctx" $ "component" "frontend") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ticketing.componentLabels" (dict "ctx" $ "component" "frontend") | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "ticketing.componentSelectorLabels" (dict "ctx" $ "component" "frontend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ticketing.componentSelectorLabels" (dict "ctx" $ "component" "frontend") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ticketing.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: frontend
          image: {{ include "ticketing.image" (dict "ctx" $ "image" .Values.frontend.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: {{ .Values.frontend.env.NODE_ENV | quote }}
            - name: FRONTEND_PORT
              value: {{ .Values.frontend.env.FRONTEND_PORT | quote }}
            - name: API_BASE_URL
              value: {{ .Values.frontend.env.API_BASE_URL | quote }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.frontend.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.frontend.readinessProbe | nindent 12 }}
{{- end }}
