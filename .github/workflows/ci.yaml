name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Hello World - ostavljamo radi referentne svrhe i debug-a
  hello:
    name: Hello World Test
    runs-on: ubuntu-latest
    steps:
      - name: Pozdrav i info
        run: |
          echo "Pozdrav iz GitHub Actions!"
          echo "Repository: ${{ github.repository }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"

  # Build job sad uključuje Trivy security scan
  build:
    name: Build & Scan Docker Images
    runs-on: ubuntu-latest
    needs: hello

    permissions:
      contents: read           # za checkout
      security-events: write   # za SARIF upload u Security tab

    strategy:
      matrix:
        service:
          - api
          - worker
          - frontend
      fail-fast: false

    steps:
      - name: Checkout koda
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: false
          load: true            # Učitaj sliku u lokalni Docker (za Trivy)
          tags: |
            ticketing-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ticketing-${{ matrix.service }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-${{ matrix.service }}.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'        # Za sad ne padaj na ranjivosti

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-${{ matrix.service }}.sarif'
          category: 'trivy-${{ matrix.service }}'

      - name: Trivy table report (čitljiv u logovima)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ticketing-${{ matrix.service }}:${{ github.sha }}
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'